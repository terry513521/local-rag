name: Docker Build

"on":
  pull_request:
    branches:
      - "develop"
      - "master"
      - "main"
  push:
    branches:
      - "develop"
      - "master"
      - "main"

env:
  TERM: 'xterm'
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

permissions:
  contents: read

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Checkout source code
        id: checkout-code
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump-tag
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_floor="v2.0.0"
          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [[ -z "$latest_tag" ]]; then
            new_tag="$release_floor"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"

            if (( major < 2 )); then
              new_tag="$release_floor"
            else
              new_tag="v${major}.${minor}.$((patch + 1))"
            fi
          fi

          git tag "$new_tag"
          git push origin "$new_tag"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Build Docker Tags
        id: docker-tags
        run: |
          if [[ "${{ github.event_name }}" = "pull_request" ]]; then
            TAGS="${{ github.repository }}:pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.ref_name }}" = "develop" ]]; then
            TAGS="${{ github.repository }}:develop"
          elif [[ "${{ github.ref_name }}" = "main" || "${{ github.ref_name }}" = "master" ]]; then
            TAGS="${{ github.repository }}:${{ steps.bump-tag.outputs.new_tag }},${{ github.repository }}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        id: setup-qemu
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        
      - name: Build Docker Image
        id: docker-build
        uses: docker/build-push-action@v7.2.0
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          context: ./
          platforms: linux/amd64
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack
        if: ${{ always() && github.event_name == 'push' && env.SLACK_WEBHOOK_URL != '' }}
        uses: act10ns/slack@v2.2.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
