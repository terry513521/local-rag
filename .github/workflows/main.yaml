name: Docker Build

"on":
  pull_request:
    branches:
      - "develop"
      - "master"
      - "main"
  push:
    branches:
      - "develop"
      - "master"
      - "main"

env:
  TERM: 'xterm'
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

permissions:
  contents: read

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Checkout source code
        id: checkout-code
        uses: actions/checkout@v6.0.2

      - name: Build Docker Tags
        id: docker-tags
        run: |
          if [[ "${{ github.event_name }}" = "pull_request" ]]; then
            TAGS="${{ github.repository }}:pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.ref_name }}" = "develop" ]]; then
            TAGS="${{ github.repository }}:develop"
          elif [[ "${{ github.ref_name }}" = "main" || "${{ github.ref_name }}" = "master" ]]; then
            TAGS="${{ github.repository }}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        id: setup-qemu
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        
      - name: Build Docker Image
        id: docker-build
        uses: docker/build-push-action@v7.1.0
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          context: ./
          platforms: linux/amd64
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack
        if: ${{ always() && github.event_name == 'push' && env.SLACK_WEBHOOK_URL != '' }}
        uses: act10ns/slack@v2.2.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
